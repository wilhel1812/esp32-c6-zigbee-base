esphome:
  name: esphome-web-f93fbc
  friendly_name: ESPHome Web f93fbc
  min_version: 2026.4.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 70%

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

zigbee:
  id: zb
  model: "ESP32-C6 Zigbee Base"
  router: false
  power_source: DC_SOURCE
  on_join:
    then:
      - lambda: |-
          id(zigbee_state) = x ? "JOINED" : "REJOINED";
      - component.update: status_lcd

globals:
  - id: zigbee_state
    type: std::string
    restore_value: false
    initial_value: '"PAIRING"'

binary_sensor:
  - platform: gpio
    id: boot_button
    name: "Boot Button"
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(zigbee_state) = "BUTTON";
        - component.update: status_lcd
    on_release:
      then:
        - lambda: |-
            id(zigbee_state) = "READY";
        - component.update: status_lcd
    on_click:
      - min_length: 8s
        max_length: 30s
        then:
          - lambda: |-
              id(zigbee_state) = "RESET";
          - component.update: status_lcd
          - zigbee.factory_reset

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO6

output:
  - platform: ledc
    pin: GPIO22
    id: lcd_backlight_pwm

light:
  - platform: monochromatic
    id: lcd_backlight
    output: lcd_backlight_pwm
    internal: true

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 30
  - file: "gfonts://Roboto"
    id: font_detail
    size: 18

display:
  - platform: mipi_spi
    id: status_lcd
    model: ST7789V
    cs_pin: GPIO14
    dc_pin: GPIO15
    reset_pin: GPIO21
    dimensions:
      width: 240
      height: 240
    update_interval: 5s
    lambda: |-
      it.fill(Color(5, 18, 28));
      it.print(120, 82, id(font_title), Color(235, 248, 255), TextAlign::CENTER, "ZIGBEE");
      it.print(120, 122, id(font_detail), Color(112, 190, 255), TextAlign::CENTER, id(zigbee_state).c_str());
      it.print(120, 162, id(font_detail), Color(190, 205, 215), TextAlign::CENTER, "BOOT BUTTON SENSOR");
