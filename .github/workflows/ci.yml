name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs:check

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs
      - run: bundle exec jekyll build --destination ../_site
        working-directory: docs

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build generic device
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            espressif/idf:v5.4.2 \
            bash -lc 'git config --global --add safe.directory /project && apt-get update && apt-get install -y nodejs npm && npm ci && cd examples/generic_device && idf.py set-target esp32c6 && idf.py build'
